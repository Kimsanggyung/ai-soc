<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI-SOC 지능형 통합 보안 자동 관제 플랫폼</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .code-font { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="p-6">
    <header class="flex justify-between items-center border-b border-gray-800 pb-4 mb-6">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-shield-halved text-red-500 text-3xl"></i>
            <div>
                <h1 class="text-2xl font-bold text-gray-100 tracking-tight">🛡️ AI-SOC 지능형 통합 보안 자동 관제 플랫폼</h1>
                <p class="text-xs text-gray-400 mt-0.5">Suricata IDS + Llama 3.1 Real-Time SOAR Pipeline</p>
            </div>
        </div>
        <div id="connection-badge" class="px-3 py-1.5 rounded-full text-xs font-semibold bg-red-950 text-red-400 border border-red-800 flex items-center space-x-2">
            <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
            <span>파이프라인 연결 끊김 재시도 중</span>
        </div>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <section class="lg:col-span-1 bg-gray-900 border border-gray-800 rounded-xl p-5 shadow-2xl flex flex-col justify-between">
            <div>
                <h2 class="text-lg font-bold text-gray-200 mb-4 flex items-center space-x-2">
                    <i class="fa-solid fa-fire-burner text-orange-500"></i>
                    <span>🚨 실시간 능동 대응 현황</span>
                </h2>
                <div class="bg-slate-950 border border-slate-800 rounded-lg p-6 text-center my-4">
                    <p class="text-xs text-gray-400 uppercase font-bold tracking-wider">AI 위험도 예측 스코어</p>
                    <div id="ai-score" class="text-5xl font-black text-gray-600 my-2 code-font">0.0</div>
                </div>
                <div class="space-y-3 mt-6 text-sm">
                    <div class="flex justify-between p-2.5 bg-gray-950 rounded border border-gray-800">
                        <span class="text-gray-400">능동 방화벽 액션:</span>
                        <span id="soar-action" class="font-bold text-orange-400 code-font">READY</span>
                    </div>
                    <div class="flex justify-between p-2.5 bg-gray-950 rounded border border-gray-800">
                        <span class="text-gray-400">차단 대상 IP 및 포트:</span>
                        <span id="target-ioc" class="font-bold text-yellow-500 code-font">0.0.0.0 : --</span>
                    </div>
                </div>
            </div>
            <div class="mt-8 border-t border-gray-800 pt-4 text-xs text-gray-500 flex items-center space-x-2">
                <i class="fa-solid fa-circle-notch animate-spin"></i>
                <span id="status-text">패킷 유입 대기 중...</span>
            </div>
        </section>

        <section class="lg:col-span-2 bg-gray-900 border border-gray-800 rounded-xl p-5 shadow-2xl">
            <h2 class="text-lg font-bold text-gray-200 mb-4 flex items-center space-x-2">
                <i class="fa-solid fa-file-invoice text-emerald-500"></i>
                <span>📄 Llama 3.1 실시간 침해사고 분석 기술 보고서</span>
            </h2>
            <div id="report-viewport" class="bg-slate-950 border border-slate-800 rounded-lg p-6 h-[500px] overflow-y-auto text-sm leading-relaxed text-gray-300 prose prose-invert max-w-none">
                <p class="text-gray-500 italic text-center mt-40">외부 공격 패킷이 유입되면, 실시간 완성형 마크다운 보안 보고서가 이곳에 동적 매핑됩니다.</p>
            </div>
        </section>
    </main>

    <script>
        const badge = document.getElementById('connection-badge');
        const aiScoreElement = document.getElementById('ai-score');
        const soarActionElement = document.getElementById('soar-action');
        const targetIocElement = document.getElementById('target-ioc');
        const statusTextElement = document.getElementById('status-text');
        const reportViewport = document.getElementById('report-viewport');

        const eventSource = new EventSource('/api/v1/stream');

        eventSource.onopen = () => {
            badge.className = "px-3 py-1.5 rounded-full text-xs font-semibold bg-emerald-950 text-emerald-400 border border-emerald-800 flex items-center space-x-2";
            badge.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span><span>파이프라인 연결됨</span>`;
            statusTextElement.innerText = "통합 보안 관제 인프라 가동 정상";
        };

        eventSource.addEventListener('threat_alert', (event) => {
            try {
                const payload = JSON.parse(event.data);
                const score = parseFloat(payload.ai_score);
                
                aiScoreElement.innerText = score.toFixed(1);
                if (score >= 80) {
                    aiScoreElement.className = "text-5xl font-black text-red-500 my-2 code-font animate-bounce";
                } else {
                    aiScoreElement.className = "text-5xl font-black text-orange-400 my-2 code-font";
                }

                soarActionElement.innerText = payload.action;
                soarActionElement.className = "font-bold px-2 py-0.5 rounded bg-red-950 text-red-400 border border-red-800 code-font";
                
                targetIocElement.innerText = `${payload.rule_parameters.ip} : ${payload.rule_parameters.port}`;
                statusTextElement.innerText = `🚨 위협 차단 완료: 공격 유형 [${payload.rule_parameters.attack_type}]`;

                reportViewport.innerHTML = marked.parse(payload.technical_report);
                reportViewport.scrollTop = 0;
            } catch (err) {
                console.error("Payload decoding failure:", err);
            }
        });

        eventSource.onerror = () => {
            badge.className = "px-3 py-1.5 rounded-full text-xs font-semibold bg-red-950 text-red-400 border border-red-800 flex items-center space-x-2";
            badge.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span><span>연결 끊김 재시도 중</span>`;
            statusTextElement.innerText = "서버 커넥션 불안정 - 백엔드 프로세스 가동 상태를 확인하세요.";
        };
    </script>
</body>
</html>
