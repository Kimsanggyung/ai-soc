version: '3.8'

networks:
  sec_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  soc-elasticsearch:
    image: elasticsearch:7.17.9
    container_name: soc-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      sec_network:
        ipv4_address: 172.20.0.10
    restart: always

  soc-kibana:
    image: kibana:7.17.9
    container_name: soc-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://soc-elasticsearch:9200
    depends_on:
      - soc-elasticsearch
    networks:
      sec_network:
        ipv4_address: 172.20.0.30
    restart: always

  gateway:
    image: nginx:alpine
    container_name: soc-gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      sec_network:
        ipv4_address: 172.20.0.100
    depends_on:
      - webserver
    restart: always

  webserver:
    image: httpd:alpine
    container_name: soc-webserver
    networks:
      sec_network:
        ipv4_address: 172.20.0.20
    restart: always

  suricata:
    image: jasonish/suricata:latest
    container_name: soc-suricata
    network_mode: "service:gateway"
    command: ["suricata", "-i", "eth0", "-S", "/var/lib/suricata/rules/local.rules", "--set", "vars.address-groups.EXTERNAL_NET=any", "-vvv"]
    volumes:
      - ./suricata/rules:/var/lib/suricata/rules
      - ./suricata/log:/var/log/suricata
    depends_on:
      - gateway
    restart: always