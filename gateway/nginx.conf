user  nginx;
worker_processes  auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream mock_webserver {
        server soc-webserver:80;
    }

    upstream ai_backend {
        server host.docker.internal:8000;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://mock_webserver;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/predict {
            proxy_pass http://ai_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/stream {
            proxy_pass http://ai_backend;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 86400s;
        }

        location /api/v1/dashboard {
            proxy_pass http://ai_backend;
            proxy_set_header Host $host;
        }

        # ===============================================================================
        # 💡 [새로 추가] 외부 이종 웹사이트 연동을 위한 전용 공용 원격 관제 게이트 통로
        # ===============================================================================
        location /api/v1/external/ {
            proxy_pass http://ai_backend; # 정의되어 있는 진짜 AI 백엔드 업스트림으로 정밀 토스
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # 외부 브라우저 호출(Cross-Origin)을 대비한 CORS 사전 차단 방어 프리플라이트 해제
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-API-KEY';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-API-KEY' always;
        }
    }
}